<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insights | The Distribution Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1B5E3B;
    --green-mid: #2E7D52;
    --green-light: #E8F5EE;
    --cream: #F7F4EE;
    --cream-dark: #EDE9E0;
    --black: #0A0A0A;
    --grey: #6B6B6B;
    --white: #FFFFFF;
    --shadow: 0 20px 40px rgba(27, 94, 59, 0.06);
    --shadow-hover: 0 30px 60px rgba(27, 94, 59, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body { 
    font-family: 'DM Sans', sans-serif; 
    background: var(--cream); 
    color: var(--black); 
    line-height: 1.6;
  }
  
  /* NAV - Frosted Glass Effect */
  nav { 
    padding: 1.2rem 4rem; 
    background: rgba(247, 244, 238, 0.85); 
    backdrop-filter: blur(15px); 
    position: fixed; 
    width: 100%; 
    top: 0; 
    z-index: 100; 
    border-bottom: 1px solid rgba(27, 94, 59, 0.08); 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
  }

  .nav-logo { 
    font-family: 'Playfair Display', serif; 
    font-size: 1.4rem; 
    font-weight: 900; 
    color: var(--green); 
    text-decoration: none; 
    letter-spacing: -0.02em;
  }

  .nav-logo span { font-style: italic; color: var(--green-mid); }
  
  /* HEADER - Editorial Style */
  .blog-header { 
    padding: 8rem 4rem 6rem; 
    text-align: center; 
    background: radial-gradient(circle at center, rgba(27, 94, 59, 0.03) 0%, transparent 70%);
  }

  .section-label { 
    font-family: 'DM Mono', monospace; 
    font-size: 0.7rem; 
    text-transform: uppercase; 
    color: var(--green); 
    letter-spacing: 0.2em; 
    margin-bottom: 1.5rem; 
    display: block; 
    opacity: 0.8;
  }

  h1 { 
    font-family: 'Playfair Display', serif; 
    font-size: clamp(2.8rem, 6vw, 4.5rem); 
    font-weight: 900;
    line-height: 1.05; 
    margin-bottom: 1.5rem; 
    letter-spacing: -0.03em;
  }

  /* GRID SYSTEM */
  .blog-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
    gap: 3rem; 
    padding: 0 4rem 10rem; 
    max-width: 1400px;
    margin: 0 auto;
  }

  .blog-card { 
    background: var(--white); 
    border-radius: 2px; 
    overflow: hidden; 
    border: 1px solid rgba(27, 94, 59, 0.05); 
    text-decoration: none; 
    color: inherit; 
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow);
  }

  .blog-card:hover { 
    transform: translateY(-8px); 
    box-shadow: var(--shadow-hover);
    border-color: rgba(27, 94, 59, 0.15);
  }

  .blog-card-img-wrapper {
    width: 100%;
    height: 240px;
    overflow: hidden;
    position: relative;
  }

  .blog-card-img { 
    width: 100%;
    height: 100%;
    background-size: cover; 
    background-position: center; 
    transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
  }

  .blog-card:hover .blog-card-img {
    transform: scale(1.05);
  }

  .blog-category { 
    position: absolute;
    bottom: 1.5rem;
    left: 1.5rem;
    font-family: 'DM Mono', monospace; 
    font-size: 0.6rem; 
    color: white; 
    padding: 0.4rem 0.8rem; 
    border: 1px solid rgba(255, 255, 255, 0.4); 
    border-radius: 1px; 
    text-transform: uppercase; 
    background: rgba(0, 0, 0, 0.2); 
    backdrop-filter: blur(8px); 
    letter-spacing: 0.1em;
  }

  .blog-card-body { padding: 2rem; flex-grow: 1; display: flex; flex-direction: column; }

  .blog-card-title { 
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem; 
    font-weight: 700; 
    line-height: 1.3; 
    margin-bottom: 1.2rem; 
    color: var(--black);
    flex-grow: 1;
  }

  .blog-card-meta { 
    font-size: 0.75rem; 
    color: var(--grey); 
    font-family: 'DM Mono', monospace; 
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--cream-dark);
  }

  /* Entrance Animation */
  .fade-up {
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
  }

  .fade-up.visible {
    opacity: 1;
    transform: translateY(0);
  }

  @media (max-width: 900px) { 
    nav { padding: 1rem 1.5rem; }
    .blog-grid { grid-template-columns: 1fr; padding: 0 1.5rem 6rem; gap: 2rem; } 
    .blog-header { padding: 10rem 1.5rem 4rem; } 
    h1 { font-size: 2.5rem; }
  }
</style>
</head>
<body>

<nav>
  <a href="tdl_landing.html" class="nav-logo">The Distribution <span>Lab</span></a>
</nav>

<header class="blog-header">
  <span class="section-label">Intelligence Archive</span>
  <h1>The Distribution <br>Intelligence</h1>
</header>

<div class="blog-grid" id="blog-archive-container">
  <p style="grid-column: 1/-1; text-align: center; color: var(--grey); font-family: 'DM Mono', monospace;">Decrypting lab insights...</p>
</div>

<script>
  // Animation Logic
  const revealOnScroll = () => {
    const cards = document.querySelectorAll('.fade-up');
    cards.forEach(card => {
      const cardTop = card.getBoundingClientRect().top;
      if (cardTop < window.innerHeight - 50) {
        card.classList.add('visible');
      }
    });
  };

  async function fetchAllBlogs() {
    const PROJECT_ID = "uc51i7d5"; 
    const DATASET = "production";
    const QUERY = encodeURIComponent(`*[_type == "post"] | order(publishedAt desc) {
        title,
        author,
        category,
        "imageUrl": mainImage.asset->url,
        "slug": slug.current,
        publishedAt
    }`);

    const url = `https://${PROJECT_ID}.api.sanity.io/v2021-10-21/data/query/${DATASET}?query=${QUERY}`;

    try {
        const response = await fetch(url);
        const { result } = await response.json();
        const container = document.getElementById('blog-archive-container');

        if (result && result.length > 0) {
            container.innerHTML = result.map((post, index) => `
                <a href="blog-post.html?slug=${post.slug}" class="blog-card fade-up" style="transition-delay: ${index * 0.1}s">
                    <div class="blog-card-img-wrapper">
                      <div class="blog-card-img" style="background-image: url('${post.imageUrl}')"></div>
                      <span class="blog-category">${post.category || 'Analysis'}</span>
                    </div>
                    <div class="blog-card-body">
                        <div class="blog-card-title">${post.title}</div>
                        <div class="blog-card-meta">
                          <span>${post.author || 'Abhishek Rajput'}</span>
                          <span style="opacity: 0.3;">|</span>
                          <span>${new Date(post.publishedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</span>
                        </div>
                    </div>
                </a>
            `).join('');
            
            // Trigger animation for the first batch
            setTimeout(revealOnScroll, 100);
        } else {
            container.innerHTML = "<p style='grid-column: 1/-1; text-align: center; font-family: \"DM Mono\"; opacity: 0.5;'>The lab is currently empty. Check back shortly.</p>";
        }
    } catch (err) {
        console.error("Sanity Error:", err);
    }
  }

  window.addEventListener('scroll', revealOnScroll);
  fetchAllBlogs();
</script>
</body>
</html>
